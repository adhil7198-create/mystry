<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUET Psychology Mastery – MCQ Game</title>
    <meta name="description" content="Gamified CUET Psychology preparation platform with 20 levels, 1500+ questions, and performance tracking.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Style -->
    <link rel="stylesheet" href="style.css">
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
        // Global error handler for debugging on mobile
        window.onerror = function(msg, url, line, col, error) {
            console.error('Mobile Debug Catch:', msg, url, line);
            const loader = document.getElementById('loader');
            if (loader) {
                loader.innerHTML = '<div class="glass-card" style="border-color: #f43f5e; color: white; padding: 1rem; max-width: 90%; margin: 0 auto;">' +
                    '<h3>System Error</h3>' +
                    '<p style="font-size: 0.8rem; opacity: 0.8;">' + msg + '</p>' +
                    '<button onclick="location.reload()" style="margin-top: 1rem; padding: 0.5rem 1rem; border-radius: 8px; border: none; background: white; color: black; font-weight: bold;">Retry</button>' +
                    '</div>';
                loader.style.background = 'rgba(0,0,0,0.9)';
            }
            return false;
        };
    </script>
</head>
<body class="dark-theme">
    <div id="app-container">
        <!-- Navigation -->
        <nav id="main-nav">
            <div class="nav-content">
                <div class="logo">
                    <span class="logo-icon">🧠</span>
                    <span class="logo-text">PsychMastery</span>
                </div>
                <div class="nav-items" id="nav-items">
                    <!-- Dynamic nav items -->
                </div>
                <div class="user-stats" id="nav-stats">
                    <!-- XP and Badges -->
                </div>
            </div>
        </nav>

        <!-- Main Content Area (Dynamic) -->
        <main id="main-view">
            <div id="loader" class="loader-overlay">
                <div style="text-align: center;">
                    <div class="brain-loader" style="margin: 0 auto 1.5rem;"></div>
                    <p class="text-secondary" style="font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; opacity: 0.8; color: #94a3b8;">Initializing System...</p>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer id="main-footer" class="hidden">
            <p>&copy; 2026 CUET Psychology Mastery. Level up your mind.</p>
        </footer>
    </div>

    <!-- Application Script -->
    <script type="module" src="app.js"></script>
</body>
</html>
